<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI时代协作方法论复盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-blue: #6366f1;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============ 背景繁星 ============ */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        /* ============ 左侧固定导航栏 ============ */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, rgba(18, 18, 42, 0.95), rgba(10, 10, 26, 0.98));
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 100;
            padding: 30px 20px;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-title {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(90deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .sidebar-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
        }

        /* 导航滑动指示器 */
        .nav-indicator {
            position: absolute;
            left: 3px;
            width: 4px;
            height: 0;
            background: linear-gradient(180deg, var(--accent-purple), var(--accent-pink));
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 10;
            opacity: 0;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            margin: 2px 0;
        }

        .nav-item.parent {
            font-weight: 600;
        }

        .nav-item.child {
            padding-left: 24px;
            font-size: 0.85rem;
            opacity: 0.85;
        }

        .nav-item.child .nav-dot {
            width: 8px;
            height: 8px;
            margin-right: 10px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .nav-link:hover {
            background: rgba(99, 102, 241, 0.15);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(236, 72, 153, 0.2));
            color: var(--text-primary);
            border-left: 3px solid var(--accent-purple);
        }

        .nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            margin-right: 12px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .nav-link.active .nav-dot {
            background: var(--accent-purple);
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.6);
        }

        .nav-label {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-hint {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            margin-left: 8px;
        }

        /* ============ 主内容区域 ============ */
        .main-wrapper {
            margin-left: 280px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 50px 100px 50px;
        }

        /* 文档页脚 */
        .doc-footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 60px;
        }

        .doc-footer a {
            color: var(--accent-purple);
            text-decoration: none;
        }

        /* ============ 卡片样式 ============ */
        .section-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 40px;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            /* 确保内容在背景之上 */
            position: relative;
            z-index: 1;
        }

        .section-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
        }

        /* 一级标题 */
        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ============ 内容层级样式 ============ */
        .level-2-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #c4b5fd;
            margin: 30px 0 18px 25px;
            padding-left: 20px;
            position: relative;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.4s ease;
        }

        .level-2-title.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .level-2-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 65%;
            background: linear-gradient(180deg, var(--accent-purple), var(--accent-pink));
            border-radius: 2px;
        }

        /* 子章节标题（在卡片头部内显示） */
        .subsection-title {
            margin: 8px 0 0 0;
            padding-left: 0;
            font-size: 1rem;
            color: var(--accent-blue);
        }
        .subsection-title::before {
            display: none;
        }

        .level-3-title {
            font-size: 1rem;
            font-weight: 600;
            color: #a5b4fc;
            margin: 22px 0 12px 45px;
            padding-left: 15px;
            border-left: 2px solid rgba(139, 92, 246, 0.35);
            opacity: 0;
            transform: translateX(-8px);
            transition: all 0.4s ease;
        }

        .level-3-title.visible {
            opacity: 1;
            transform: translateX(0);
        }

        /* 列表项连接线 */
        .content-list {
            list-style: none;
            margin: 12px 0;
        }

        .content-list li {
            position: relative;
            padding: 10px 0 10px 55px;
            margin: 6px 0;
            color: #d1d5db;
            line-height: 1.7;
            font-size: 0.95rem;
            opacity: 0;
            transform: translateX(-8px);
            transition: all 0.4s ease;
        }

        .content-list li.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .content-list li::before {
            content: '';
            position: absolute;
            left: 28px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, transparent, rgba(99, 102, 241, 0.5), transparent);
        }

        .content-list li::after {
            content: '';
            position: absolute;
            left: 24px;
            top: 18px;
            width: 9px;
            height: 9px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(139, 92, 246, 0.5);
        }

        /* 引用块 */
        .quote-box {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.08));
            border-left: 4px solid var(--accent-purple);
            padding: 20px 24px;
            margin: 20px 0;
            border-radius: 0 12px 12px 0;
            color: #e0e7ff;
            font-style: italic;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .quote-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .quote-box strong {
            color: #c4b5fd;
        }

        /* 代码块 */
        .code-block {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 18px 24px;
            margin: 18px 0;
            font-family: 'Fira Code', 'Consolas', 'Monaco', monospace;
            color: #a5f3fc;
            font-size: 0.9rem;
            line-height: 1.6;
            overflow-x: auto;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .code-block.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .data-table.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .data-table th,
        .data-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .data-table th {
            background: rgba(99, 102, 241, 0.2);
            color: #c4b5fd;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .data-table td {
            color: #d1d5db;
            font-size: 0.9rem;
        }

        .data-table tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        /* 信息表格 */
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .info-table.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .info-table th,
        .info-table td {
            padding: 12px 16px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-table th {
            background: rgba(99, 102, 241, 0.15);
            color: #c4b5fd;
            font-weight: 600;
        }

        .info-table td {
            color: #d1d5db;
        }

        /* 分隔线 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.25), transparent);
            margin: 30px 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .divider.visible {
            opacity: 1;
        }

        /* 特殊框体 */
        .highlight-box {
            padding: 20px 24px;
            border-radius: 12px;
            margin: 20px 0;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .highlight-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .highlight-box.insight {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(249, 115, 22, 0.08));
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .highlight-box.insight::before {
            content: '💡 关键洞察';
            display: block;
            font-weight: 600;
            color: #fbbf24;
            margin-bottom: 10px;
        }

        .highlight-box.conclusion {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(5, 150, 105, 0.08));
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .highlight-box.conclusion::before {
            content: '🎯 核心结论';
            display: block;
            font-weight: 600;
            color: #34d399;
            margin-bottom: 10px;
        }

        .highlight-box.warning {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(185, 28, 28, 0.08));
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .highlight-box.warning::before {
            content: '⚠️ 警示';
            display: block;
            font-weight: 600;
            color: #f87171;
            margin-bottom: 10px;
        }

        /* 标签 */
        .tag {
            display: inline-block;
            padding: 5px 14px;
            background: rgba(99, 102, 241, 0.18);
            border: 1px solid rgba(99, 102, 241, 0.35);
            border-radius: 20px;
            font-size: 0.85rem;
            color: #a5b4fc;
            margin: 5px 5px 5px 0;
        }

        /* 强调文本 */
        .highlight {
            color: #f472b6;
            font-weight: 600;
        }

        .key-point {
            color: #fbbf24;
            font-weight: 600;
        }

        /* ============ 过渡动画画布 ============ */
        #star-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* ============ 响应式 ============ */
        @media (max-width: 900px) {
            .sidebar {
                width: 60px;
                padding: 20px 10px;
            }

            .sidebar-header,
            .nav-label,
            .nav-hint {
                display: none;
            }

            .nav-link {
                justify-content: center;
                padding: 14px;
            }

            .nav-dot {
                margin-right: 0;
            }

            .main-wrapper {
                margin-left: 60px;
            }

            .main-content {
                padding: 30px 25px 60px 25px;
            }

            .section-card {
                padding: 25px;
            }
        }

        @media (max-width: 600px) {
            .sidebar {
                width: 50px;
            }

            .main-wrapper {
                margin-left: 50px;
            }

            .main-content {
                padding: 20px 15px 50px 15px;
            }

            .section-card {
                padding: 20px;
                margin-bottom: 30px;
            }

            .card-title {
                font-size: 1.3rem;
            }

            .card-number {
                width: 38px;
                height: 38px;
                font-size: 0.95rem;
            }
        }

        /* 滚动条美化 */
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        /* 文档页脚 */
        .doc-footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 60px;
            opacity: 0;
            animation: fadeIn 1s ease 1.5s forwards;
        }

        .doc-footer a {
            color: var(--accent-purple);
            text-decoration: none;
        }

        .doc-footer p {
            margin: 5px 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 侧边栏底部 */
        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        .sidebar-footer div {
            margin: 3px 0;
        }
    </style>
</head>
<body>
    <!-- 背景繁星 -->
    <div class="starfield" id="starfield"></div>

    <!-- 过渡动画画布 -->
    <canvas id="star-transition"></canvas>

    <!-- 左侧导航栏 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">AI协作方法论</div>
            <div class="sidebar-subtitle">从"会用AI"到"被AI赋能"的认知升级</div>
        </div>
        <div class="nav-indicator" id="nav-indicator"></div>
        <ul class="nav-list" id="nav-list">
            <!-- 导航项由JS生成 -->
        </ul>
        <div class="sidebar-footer">
            <div>复盘日期：2026年4月4日</div>
            <div>文档版本：v1.0</div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-wrapper">
        <div class="main-content" id="main-content">
            <!-- 内容由JS生成 -->
        </div>
    </main>

    <script>
        // ==================== 数据结构（嵌套结构，父章节包含子章节） ====================
        const sections = [
            // 0. 核心观点（独立章节）
            {
                id: 'intro',
                title: '核心观点',
                icon: '💡',
                content: `
                    <div class="quote-box">
                        <strong>AI的能力已经完全足够，瓶颈不是AI，而是你这个人。你需要升级的不是工具，而是思维。</strong>
                    </div>
                    <div class="divider"></div>
                    <h3 class="level-2-title">来自真实用户的数据</h3>
                    <table class="data-table">
                        <thead>
                            <tr><th>指标</th><th>数据</th></tr>
                        </thead>
                        <tbody>
                            <tr><td>使用豆包的比例</td><td>97%</td></tr>
                            <tr><td>使用DeepSeek的比例</td><td>96%</td></tr>
                            <tr><td>自评均分</td><td>5.19分</td></tr>
                            <tr><td class="highlight">输出不稳定</td><td class="highlight">60%</td></tr>
                            <tr><td class="highlight">不知道如何跟业务结合</td><td class="highlight">60%</td></tr>
                        </tbody>
                    </table>
                    <p style="color: var(--text-secondary); margin-top: 15px; font-size: 0.9rem;">问题所在：工具普及率极高，但应用深度严重不足。</p>
                `
            },
            // 一、道（包含4个子章节）
            {
                id: 'dao',
                title: '一、道：什么才是真正值钱的',
                icon: '🎯',
                subsections: [
                    {
                        id: 'dao-1-1',
                        title: '1.1 公式的根本性变化',
                        content: `
                            <p><strong>工业时代公式：</strong></p>
                            <div class="code-block">做成一件事 = 10%灵感 + 90%执行力</div>
                            <p><strong>AI时代现实：</strong></p>
                            <div class="code-block">这90%的执行力，AI已经能做了</div>
                            <div class="highlight-box conclusion">
                                <strong>剩下真正值钱的是什么？</strong><br><br>
                                <span class="key-point">• 视角（Vision）——看到别人看不到的机会</span><br>
                                <span class="key-point">• 审美（Taste）——知道什么才是真的好</span><br>
                                <span class="key-point">• 判断力（Judgment）——在模糊信息中做出正确决策</span>
                            </div>
                            <div class="quote-box">
                                <strong>关键洞察：知道该做什么，比能做什么更值钱</strong>
                            </div>
                        `
                    },
                    {
                        id: 'dao-1-2',
                        title: '1.2 为什么你用不好AI？',
                        content: `
                            <div class="highlight-box warning">
                                <strong>普遍误区：</strong>大家还在讨论哪个模型好、什么工具好用<br>
                                <strong>但事实：</strong>现在的AI能力已经完全够了
                            </div>
                            <div class="quote-box">
                                <strong>"我参与越少，AI产出质量越高；参与越多，反而越差"</strong>
                            </div>
                            <h4 class="level-3-title">数据支撑</h4>
                            <ul class="content-list">
                                <li>参与度在<strong class="highlight">20%以内</strong>时效果最好</li>
                                <li>超过20%开始下降</li>
                            </ul>
                            <div class="highlight-box conclusion">
                                我们以为自己在帮AI，很多时候我们在<strong>拖AI后腿</strong>
                            </div>
                        `
                    },
                    {
                        id: 'dao-1-3',
                        title: '1.3 同样的AI，凭什么你用出来不一样？',
                        content: `
                            <p><strong>事实：</strong></p>
                            <ul class="content-list">
                                <li>大家用的模型都一样，工具都一样</li>
                                <li>差别不是工具，不是提示词，不是什么秘密技巧</li>
                            </ul>
                            <div class="highlight-box insight">
                                <strong>真相：</strong><br>
                                差别就是你这个人

                    firstSubId: hasSubsections ? section.subsections[0].id : null
                });

                // 如果有子章节，添加所有子项
                if (hasSubsections) {
                    section.subsections.forEach((sub) => {
                        navItems.push({
                            id: sub.id,
                            title: sub.title,
                            icon: '📌',
                            isParent: false,
                            parentId: section.id,
                            parentTitle: section.title,
                            sectionIndex: sectionIndex // 指向父章节在sections中的索引
                        });
                    });
                }
            });
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initStarfield();
            initTransitionCanvas();
            buildNavItems(); // 构建扁平化导航数组
            renderSidebar();
            renderContent();
            bindEvents();
            // 初始化显示第一页内容
            setTimeout(() => {
                showSection(0, false);
            }, 100);
        });

        // ==================== 背景繁星 ====================
        function initStarfield() {
            const starfield = document.getElementById('starfield');
            const starCount = 180;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                star.style.width = (1 + Math.random() * 2) + 'px';
                star.style.height = star.style.width;
                starfield.appendChild(star);
            }
        }

        // ==================== 过渡动画画布（繁星闪过效果） ====================
        function initTransitionCanvas() {
            const canvas = document.getElementById('star-transition');
            transitionCanvas = canvas;
            transitionCtx = canvas.getContext('2d');

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            animateTransition();
        }

        function createTransitionParticle(x, y) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1.5 + Math.random() * 3;
            return {
                x,
                y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 1,
                decay: 0.006 + Math.random() * 0.008,
                size: 1 + Math.random() * 1.5,
                color: Math.random() > 0.5 ? '#8b5cf6' : '#ec4899'
            };
        }

        function burstTransition(x, y, count = 80) {
            for (let i = 0; i < count; i++) {
                transitionParticles.push(createTransitionParticle(x, y));
            }
        }

        function animateTransition() {
            transitionCtx.clearRect(0, 0, transitionCanvas.width, transitionCanvas.height);

            for (let i = transitionParticles.length - 1; i >= 0; i--) {
                const p = transitionParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;

                if (p.life <= 0) {
                    transitionParticles.splice(i, 1);
                    continue;
                }

                // 绘制发光粒子
                transitionCtx.beginPath();
                transitionCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                transitionCtx.fillStyle = p.color;
                transitionCtx.globalAlpha = p.life * 0.8;
                transitionCtx.fill();

                // 发光效果
                transitionCtx.shadowBlur = 8;
                transitionCtx.shadowColor = p.color;
            }

            transitionCtx.globalAlpha = 1;
            transitionCtx.shadowBlur = 0;
            requestAnimationFrame(animateTransition);
        }

        // ==================== 侧边栏 ====================
        function renderSidebar() {
            const navList = document.getElementById('nav-list');
            let navIndex = 0; // 用于为每个导航项分配唯一的data-index

            const html = sections.map((section) => {
                // 渲染父章节
                const parentHtml = `
                    <li class="nav-item parent">
                        <a class="nav-link" data-index="${navIndex}" href="#${section.id}">
                            <span class="nav-dot"></span>
                            <span class="nav-label">${section.icon} ${section.title}</span>
                            <span class="nav-hint">${navIndex + 1}/${navItems.length}</span>
                        </a>
                    </li>
                `;
                navIndex++;

                // 渲染子章节（如果有）
                let childrenHtml = '';
                if (section.subsections) {
                    childrenHtml = section.subsections.map((sub) => {
                        const childHtml = `
                    <li class="nav-item child">
                        <a class="nav-link" data-index="${navIndex}" href="#${sub.id}">
                            <span class="nav-dot"></span>
                            <span class="nav-label">${sub.title}</span>
                            <span class="nav-hint">${navIndex + 1}/${navItems.length}</span>
                        </a>
                    </li>
                `;
                        navIndex++;
                        return childHtml;
                    }).join('');
                }

                return parentHtml + childrenHtml;
            }).join('');

            navList.innerHTML = html;
        }

        // ==================== 导航指示器 ====================
        function moveIndicatorTo(index) {
            const indicator = document.getElementById('nav-indicator');
            const navLinks = document.querySelectorAll('.nav-link');

            if (navLinks[index]) {
                const target = navLinks[index];

                // 使用getBoundingClientRect计算相对于sidebar的位置
                const targetRect = target.getBoundingClientRect();
                const sidebar = document.querySelector('.sidebar');
                const sidebarRect = sidebar.getBoundingClientRect();

                // 计算相对于sidebar的位置
                const relativeTop = targetRect.top - sidebarRect.top;
                const height = target.offsetHeight;

                // 移动指示器
                indicator.style.height = height + 'px';
                indicator.style.top = relativeTop + 'px';
                indicator.style.opacity = '1';

                // 自动滚动sidebar，确保目标项的最佳显示位置
                const sidebarHeight = sidebarRect.height;
                const targetHeight = target.offsetHeight;
                const targetTop = targetRect.top - sidebarRect.top + sidebar.scrollTop;
                const targetBottom = targetTop + targetHeight;

                // 情况1：目标项高度超过sidebar可视高度
                // 滚动到目标项的底部，使其最后部分可见
                if (targetHeight >= sidebarHeight) {
                    const newScrollTop = targetBottom - sidebarHeight;
                    sidebar.scrollTo({
                        top: newScrollTop,
                        behavior: 'smooth'
                    });
                }
                // 情况2：目标项可以完全显示，但底部超出可视区域
                else if (targetBottom > sidebar.scrollTop + sidebarHeight) {
                    // 滚动到目标项底部刚好可见
                    const newScrollTop = targetBottom - sidebarHeight;
                    sidebar.scrollTo({
                        top: newScrollTop,
                        behavior: 'smooth'
                    });
                }
                // 情况3：目标项顶部在可视区域上方
                else if (targetTop < sidebar.scrollTop) {
                    // 滚动到目标项顶部刚好可见
                    sidebar.scrollTo({
                        top: targetTop,
                        behavior: 'smooth'
                    });
                }
            }
        }

        // ==================== 内容渲染 ====================
        function renderContent() {
            const container = document.getElementById('main-content');
            let html = '';
            let cardIndex = 0;

            sections.forEach((section) => {
                if (section.subsections && section.subsections.length > 0) {
                    // 为每个子章节创建独立的卡片
                    section.subsections.forEach((sub) => {
                        // 提取章节号（如从"1.1"提取"1.1"）
                        const subNumber = sub.title.match(/^\d+\.\d+/)?.[0] || `${cardIndex + 1}`;
                        html += `
                    <div class="section-card" id="section-${sub.id}" data-index="${cardIndex}">
                        <div class="card-header">
                            <div class="card-number">${subNumber}</div>
                            <h2 class="card-title">${section.icon} ${section.title}</h2>
                            <h3 class="level-2-title subsection-title">${sub.title}</h3>
                        </div>
                        <div class="card-body">
                            ${sub.content || ''}
                        </div>
                    </div>
                `;
                        cardIndex++;
                    });
                } else {
                    // 独立章节（无subsections）
                    html += `
                    <div class="section-card" id="section-${section.id}" data-index="${cardIndex}">
                        <div class="card-header">
                            <div class="card-number">${cardIndex + 1}</div>
                            <h2 class="card-title">${section.icon} ${section.title}</h2>
                        </div>
                        <div class="card-body">
                            ${section.content}
                        </div>
                    </div>
                `;
                    cardIndex++;
                }
            });

            html += `
                <footer class="doc-footer">
                    <p>复盘日期：2026年4月4日 | 文档版本：v1.0</p>
                    <p style="margin-top: 8px;">由 Claude Code 生成 · AI时代协作方法论复盘</p>
                </footer>
            `;

            container.innerHTML = html;
        }

        // ==================== 章节切换 ====================
        function showSection(navIndex, animate = true) {
            // 只有过渡动画进行中才阻止，允许重复访问同一导航项
            if (isTransitioning) return;
            isTransitioning = true;

            const canvasRect = transitionCanvas.getBoundingClientRect();
            const centerX = canvasRect.width / 2;
            const centerY = canvasRect.height / 2;

            // 触发繁星闪过效果（仅动画模式）
            if (animate) {
                burstTransition(centerX, centerY, 120);
            }

            // 更新导航高亮
            document.querySelectorAll('.nav-link').forEach((link, i) => {
                link.classList.toggle('active', i === navIndex);
            });

            // 移动指示器
            moveIndicatorTo(navIndex);

            // 确定目标section id
            let targetId = navItems[navIndex].id;
            // 如果是父章节且有子章节，跳转到第一个子章节
            if (navItems[navIndex].isParent && navItems[navIndex].hasSubsections) {
                targetId = navItems[navIndex].firstSubId;
            }

            const targetSection = document.getElementById(`section-${targetId}`);
            if (targetSection) {
                targetSection.classList.add('visible');
                animateSectionContent(targetSection);
                if (animate) {
                    targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } else {
                    // 非动画模式：立即滚动到目标section顶部
                    targetSection.scrollIntoView({ behavior: 'auto', block: 'start' });
                }
            }

            currentSection = navIndex;

            setTimeout(() => {
                isTransitioning = false;
            }, animate ? 600 : 0);
        }

        // ==================== 渐进动画 ====================
        function animateSectionContent(sectionEl) {
            // 按层级依次展开
            const elements = sectionEl.querySelectorAll('.level-2-title, .level-3-title, .content-list li, .quote-box, .code-block, .data-table, .info-table, .divider, .highlight-box');
            elements.forEach((el, i) => {
                setTimeout(() => {
                    el.classList.add('visible');
                }, i * 80); // 每个元素间隔80ms
            });
        }

        // ==================== 事件绑定 ====================
        function bindEvents() {
            // 导航点击
            document.getElementById('nav-list').addEventListener('click', (e) => {
                const link = e.target.closest('.nav-link');
                if (link) {
                    const idx = parseInt(link.dataset.index);
                    showSection(idx);
                }
            });

            // 键盘导航
            document.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'ArrowDown':
                    case 'ArrowRight':
                        e.preventDefault();
                        if (currentSection < navItems.length - 1) {
                            showSection(currentSection + 1);
                        }
                        break;
                    case 'ArrowUp':
                    case 'ArrowLeft':
                        e.preventDefault();
                        if (currentSection > 0) {
                            showSection(currentSection - 1);
                        }
                        break;
                    case 'Home':
                        e.preventDefault();
                        showSection(0);
                        break;
                    case 'End':
                        e.preventDefault();
                        showSection(navItems.length - 1);
                        break;
                }
            });

            // 滚轮导航（带防抖）
            let wheelTimeout;
            window.addEventListener('wheel', (e) => {
                e.preventDefault();
                clearTimeout(wheelTimeout);
                wheelTimeout = setTimeout(() => {
                    if (e.deltaY > 30) {
                        if (currentSection < navItems.length - 1) {
                            showSection(currentSection + 1);
                        }
                    } else if (e.deltaY < -30) {
                        if (currentSection > 0) {
                            showSection(currentSection - 1);
                        }
                    }
                }, 50);
            }, { passive: false });

            // 触摸导航
            let touchStartY = 0;
            window.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            });
            window.addEventListener('touchend', (e) => {
                const touchEndY = e.changedTouches[0].clientY;
                if (touchStartY - touchEndY > 60) {
                    if (currentSection < navItems.length - 1) {
                        showSection(currentSection + 1);
                    }
                } else if (touchEndY - touchStartY > 60) {
                    if (currentSection > 0) {
                        showSection(currentSection - 1);
                    }
                }
            });

            // 滚动监听 - 触发渐进动画
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        animateSectionContent(entry.target);
                    }
                });
            }, { threshold: 0.15 });

            document.querySelectorAll('.section-card').forEach(card => {
                observer.observe(card);
            });

            // 窗口大小变化时重新定位指示器
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    moveIndicatorTo(currentSection);
                }, 100);
            });
        }
    </script>
</body>
</html>
