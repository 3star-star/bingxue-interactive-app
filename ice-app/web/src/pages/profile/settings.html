<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 冰雪世界</title>
    <link rel="stylesheet" href="../../styles/settings.css">
    <link rel="stylesheet" href="../../styles/common.css">
</head>
<body>
    <div class="settings-container">
        <header class="settings-header">
            <div class="header-content">
                <button class="back-button" onclick="goBack()">← 返回</button>
                <h1>设置</h1>
            </div>
        </header>

        <main class="settings-main">
            <!-- 账户设置 -->
            <section class="settings-section">
                <h2 class="section-title">账户设置</h2>
                <div class="settings-group">
                    <div class="setting-item">
                        <div class="setting-label">用户名</div>
                        <div class="setting-value">冰雪探索者</div>
                        <button class="edit-button" onclick="editSetting('username')">编辑</button>
                    </div>
                    <div class="setting-item">
                        <div class="setting-label">邮箱</div>
                        <div class="setting-value">user@iceapp.com</div>
                        <button class="edit-button" onclick="editSetting('email')">编辑</button>
                    </div>
                    <div class="setting-item">
                        <div class="setting-label">手机号</div>
                        <div class="setting-value">138****8888</div>
                        <button class="edit-button" onclick="editSetting('phone')">编辑</button>
                    </div>
                </div>
            </section>

            <!-- 通知设置 -->
            <section class="settings-section">
                <h2 class="section-title">通知设置</h2>
                <div class="settings-group">
                    <div class="setting-item toggle-item">
                        <div class="setting-label">每日登录提醒</div>
                        <label class="toggle-switch">
                            <input type="checkbox" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-item toggle-item">
                        <div class="setting-label">新知识更新通知</div>
                        <label class="toggle-switch">
                            <input type="checkbox" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-item toggle-item">
                        <div class="setting-label">游戏活动提醒</div>
                        <label class="toggle-switch">
                            <input type="checkbox">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-item toggle-item">
                        <div class="setting-label">系统消息</div>
                        <label class="toggle-switch">
                            <input type="checkbox" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
            </section>

            <!-- 音效设置 -->
            <section class="settings-section">
                <h2 class="section-title">音效设置</h2>
                <div class="settings-group">
                    <div class="setting-item">
                        <div class="setting-label">背景音乐</div>
                        <div class="setting-value">开启</div>
                        <label class="toggle-switch">
                            <input type="checkbox" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <div class="setting-label">音效音量</div>
                        <div class="volume-slider">
                            <input type="range" min="0" max="100" value="70">
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-label">背景音乐音量</div>
                        <div class="volume-slider">
                            <input type="range" min="0" max="100" value="50">
                        </div>
                    </div>
                </div>
            </section>

            <!-- 隐私设置 -->
            <section class="settings-section">
                <h2 class="section-title">隐私设置</h2>
                <div class="settings-group">
                    <div class="setting-item toggle-item">
                        <div class="setting-label">公开学习进度</div>
                        <label class="toggle-switch">
                            <input type="checkbox" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-item toggle-item">
                        <div class="setting-label">显示成就徽章</div>
                        <label class="toggle-switch">
                            <input type="checkbox" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-item toggle-item">
                        <div class="setting-label">允许位置访问</div>
                        <label class="toggle-switch">
                            <input type="checkbox">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
            </section>

            <!-- 其他设置 -->
            <section class="settings-section">
                <h2 class="section-title">其他设置</h2>
                <div class="settings-group">
                    <div class="setting-item">
                        <div class="setting-label">清除缓存</div>
                        <div class="setting-value">128 MB</div>
                        <button class="action-button" onclick="clearCache()">清除</button>
                    </div>
                    <div class="setting-item">
                        <div class="setting-label">版本信息</div>
                        <div class="setting-value">v1.0.0</div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-label">关于我们</div>
                        <button class="action-button" onclick="showAbout()">查看</button>
                    </div>
                </div>
            </section>
        </main>

        <footer class="settings-footer">
            <nav class="bottom-nav">
                <a href="../home/index.html" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">首页</span>
                </a>
                <a href="../knowledge/index.html" class="nav-item">
                    <span class="nav-icon">📚</span>
                    <span class="nav-text">知识</span>
                </a>
                <a href="../scenery/index.html" class="nav-item">
                    <span class="nav-icon">🏔️</span>
                    <span class="nav-text">美景</span>
                </a>
                <a href="../game/index.html" class="nav-item">
                    <span class="nav-icon">🎮</span>
                    <span class="nav-text">游戏</span>
                </a>
                <a href="index.html" class="nav-item active">
                    <span class="nav-icon">👤</span>
                    <span class="nav-text">我的</span>
                </a>
            </nav>
        </footer>
    </div>

    <script src="../../scripts/settings.js"></script>
</body>
</html>
